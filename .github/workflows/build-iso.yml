name: Build ISO

on:
  workflow_run:
    workflows: ["Build container image"]
    types:
      - completed
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to build ISO from (default: latest)'
        required: false
        type: string

env:
  IMAGE_REGISTRY: "ghcr.io"
  BIB_IMAGE: "quay.io/centos-bootc/bootc-image-builder:latest"

jobs:
  build-iso:
    name: Build ArqaOS ISO
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Get image metadata
        id: metadata
        run: |
          # Load from image-template.env
          set -a
          source image-template.env
          set +a

          IMAGE_NAME="${IMAGE_NAME,,}"
          REPO_ORG="${REPO_ORGANIZATION,,}"

          # Determine tag
          if [ -n "${{ inputs.image_tag }}" ]; then
            TAG="${{ inputs.image_tag }}"
          else
            TAG=$(just generate-default-tag)
          fi

          IMAGE_URI="${IMAGE_REGISTRY}/${REPO_ORG}/${IMAGE_NAME}:${TAG}"

          echo "IMAGE_NAME=${IMAGE_NAME}" >> $GITHUB_OUTPUT
          echo "IMAGE_URI=${IMAGE_URI}" >> $GITHUB_OUTPUT
          echo "TAG=${TAG}" >> $GITHUB_OUTPUT
          echo "Building ISO for: ${IMAGE_URI}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Podman
        run: |
          podman --version
          podman info

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        run: |
          # Log in using sudo so the root-owned podman instance has access to the private registry
          echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login ${{ env.IMAGE_REGISTRY }} \
            -u ${{ github.actor }} --password-stdin

      - name: Create build directories
        run: |
          mkdir -p build_output/iso
          mkdir -p build_output/logs

      - name: Build ISO with bootc-image-builder
        run: |
          set -eux

          # Pull the OCI image from GHCR using sudo
          echo "Pulling image: ${{ steps.metadata.outputs.IMAGE_URI }}"
          if ! sudo podman pull "${{ steps.metadata.outputs.IMAGE_URI }}"; then
            echo "Failed to pull image, checking available tags..."
            sudo podman images
            exit 1
          fi

          # Verify the image exists locally in rootful storage
          sudo podman images | grep -E "${{ steps.metadata.outputs.IMAGE_NAME }}"

          # Run bootc-image-builder for ISO via sudo.
          # This gives dracut proper system-level permission scopes during initramfs assembly.
          sudo podman run --rm \
            --privileged \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            -v "$(pwd)/disk_config:/config:ro" \
            -v "$(pwd)/build_output/iso:/output" \
            --security-opt label=type:unconfined_t \
            "${{ env.BIB_IMAGE }}" \
            --type iso \
            --config /config/iso.toml \
            "${{ steps.metadata.outputs.IMAGE_URI }}" 2>&1 | tee build_output/logs/bib-build.log

          # Adjust ownership back to the runner user so GitHub Actions can clean up and upload artifacts smoothly
          sudo chown -R runner:docker build_output/

      - name: List generated artifacts
        if: always()
        run: |
          echo "=== Build Output Contents ==="
          find build_output -type f -exec ls -lh {} \;
          echo "=== Looking for ISO files ==="
          find build_output -name "*.iso" -o -name "*.qcow2"

      - name: Upload ISO as artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: arqaos-iso-${{ steps.metadata.outputs.TAG }}
          path: build_output/iso/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arqaos-iso-logs-${{ steps.metadata.outputs.TAG }}
          path: build_output/logs/
          retention-days: 7
          if-no-files-found: ignore

      - name: Create GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v') && success()
        uses: softprops/action-gh-release@v1
        with:
          files: build_output/iso/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
