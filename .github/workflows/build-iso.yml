name: Build ISO

on:
  workflow_run:
    workflows: ["Build container image"]
    types:
      - completed
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: read

    env:
      IMAGE_REGISTRY: ghcr.io
      IMAGE_NAME: arqa-core/arqaos
      DEFAULT_TAG: latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Just
        uses: extractions/setup-just@v2

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build ISO
        env:
          # Force non-local image source for CI
          SOURCE_IMAGE: ghcr.io/arqa-core/arqaos:latest
          IMAGE_REGISTRY: ghcr.io
          IMAGE_NAME: arqa-core/arqaos
          DEFAULT_TAG: latest
        run: |
          echo "Using SOURCE_IMAGE=${SOURCE_IMAGE}"
          echo "Using IMAGE_REGISTRY=${IMAGE_REGISTRY}"
          echo "Using IMAGE_NAME=${IMAGE_NAME}"
          just build-iso ghcr.io/arqa-core/arqaos latest

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: arqaos-iso
          path: output/bootiso/*.iso
          if-no-files-found: error
